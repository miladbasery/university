<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | UniAdvisor</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #050505;
            --bg-card: rgba(20, 20, 20, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --primary: #ffffff;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; outline: none; }
        body {
            font-family: 'Vazirmatn', sans-serif; margin: 0; background-color: var(--bg-body);
            background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05) 0%, transparent 50%);
            color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--bg-card); backdrop-filter: blur(24px); border: 1px solid var(--border-glass);
            padding: 40px; border-radius: 30px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }
        .brand-icon { font-size: 3rem; margin-bottom: 10px; color: #fff; }
        h2 { margin: 0 0 30px 0; font-weight: 800; font-size: 1.8rem; }
        
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .form-input {
            width: 100%; background: #111; border: 1px solid #333; padding: 14px; border-radius: 12px; color: #fff; font-family: inherit; font-size: 1rem; transition: 0.3s;
        }
        .form-input:focus { border-color: #fff; background: #000; }
        
        .btn-submit { width: 100%; background: #fff; color: #000; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        
        .auth-footer { margin-top: 25px; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: #fff; text-decoration: none; border-bottom: 1px dotted #fff; }
        
        .error-list { color: #ef4444; list-style: none; padding: 0; font-size: 0.85rem; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>
    <div class="auth-card fade-in">
        <i class="ri-graduation-cap-fill brand-icon"></i>
        <h2>ورود به حساب</h2>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">نام کاربری</label>
                <input type="text" name="username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">رمز عبور</label>
                <input type="password" name="password" class="form-input" required>
                {% if form.errors %}
                    <ul class="error-list"><li>نام کاربری یا رمز عبور اشتباه است.</li></ul>
                {% endif %}
            </div>
            <button type="submit" class="btn-submit">ورود</button>
        </form>
        
        <div class="auth-footer">
            حساب کاربری ندارید؟ <a href="{% url 'signup' %}">ثبت نام کنید</a>
        </div>
    </div>
</body>
</html>
